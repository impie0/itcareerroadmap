name: Feature request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. For broader / open-ended ideas, the
        [Discussions tab](https://github.com/impie0/itcareerroadmap/discussions)
        may be a better fit than an issue.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What can users not do today that they should be able to?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How might this work? Sketch the UX or API.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why this one is better.

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, links to similar features in other tools, etc.
