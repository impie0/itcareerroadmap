name: Bug report
description: Something on the site or in the build is broken
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly.
      placeholder: When I clicked the AZ-104 cert in the matrix, the drawer crashed with...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimum sequence to make the bug appear.
      placeholder: |
        1. Go to /certs
        2. Click the AZ-104 tile
        3. See the drawer error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: input
    id: page-url
    attributes:
      label: Page URL
      description: The URL where the bug occurs.
      placeholder: https://itcareerroadmap.com/cert/microsoft/az-104

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      description: Where did you see this bug?
      options:
        - Public site (itcareerroadmap.com)
        - Local Docker (docker compose up)
        - Local dev (npm run dev)
        - Other (specify in description)
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: Chrome 131 on Windows 11

  - type: textarea
    id: console
    attributes:
      label: Browser console output
      description: Any errors in the browser DevTools console (if applicable).
      render: text
